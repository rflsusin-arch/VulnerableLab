# .github/workflows/security-check.yml
# Executa o OWASP Dependency Check automaticamente:
#   - A cada push na branch main
#   - Em todos Pull Request para main
#   - Todas segunda-feira às 9h (varredura semanal agendada)

name: Security Check — OWASP Dependency Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Cron: minuto hora dia mês dia-semana
    # "0 12 * * 1" = todas segunda-feiras ao meio-dia UTC (9h Brasília)
    - cron: "0 12 * * 1"

jobs:
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      # Passo 1 Baixa o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # Passo 2 Configura o Java 17 (mesmo da aplicação)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Passo 3 Cache do Maven para acelerar builds subsequentes
      # O cache é invalidado quando o pom.xml muda
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Passo 4 Cache do banco de dados NVD do OWASP
      # Evita baixar ~200MB de CVEs a cada execução
      - name: Cache OWASP NVD Database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-

      # Passo 5 Executa o OWASP Dependency Check
      # -DfailBuildOnCVSS=7 falha se encontrar CVE HIGH ou CRITICAL
      - name: Executar OWASP Dependency Check
        id: owasp
        continue-on-error: true
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
        env:
          # API Key do NVD para evitar rate limiting (opcional mas recomendado)
          # Obtenha em: https://nvd.nist.gov/developers/request-an-api-key
          # Configure como secret no GitHub: Settings > Secrets > NVD_API_KEY
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # Passo 6 Salva o relatório HTML como artefato do workflow
      - name: Publicar relatório OWASP
        uses: actions/upload-artifact@v7
        with:
          name: owasp-report-${{ github.run_number }}
          path: target/dependency-check-report.html
          retention-days: 30

      # Passo 7 Falha o job caso o passo 5 tenha dado erro
      - name: Verificar falha no OWASP
        if: steps.owasp.outcome == 'failure'
        run: |
          echo "Vulnerabilidades com score >= 7 foram encontradas!"
          exit 1