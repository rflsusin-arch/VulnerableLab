# ============================================================
# application-dev.properties — Perfil de DESENVOLVIMENTO
# Carregado quando spring.profiles.active=dev
# Objetivo: facilitar o desenvolvimento local com banco em memória,
# logs detalhados e ferramentas de debug habilitadas.
# NUNCA use estas configurações em produção.
# ============================================================

# Porta onde o servidor Tomcat vai escutar as requisições HTTP.
# Em dev usamos 8081 para não conflitar com outros serviços na 8080.
server.port=8081

# ============================================================
# Banco de dados — H2 (em memória)
# O H2 é um banco de dados Java que roda direto na memória RAM.
# Vantagem: zero configuração, sobe junto com a aplicação.
# Desvantagem: os dados são perdidos quando a aplicação para.
# ============================================================

# URL de conexão com o H2 em memória.
# "mem:vulnerablelab" → banco em memória com nome "vulnerablelab"
# Os dados existem apenas enquanto a JVM estiver rodando.
spring.datasource.url=jdbc:h2:mem:vulnerablelab

# Driver JDBC do H2 — classe Java responsável por conectar ao banco.
spring.datasource.driverClassName=org.h2.Driver

# Usuário padrão do H2 (sempre "sa" = System Administrator)
spring.datasource.username=sa

# Senha do H2 em memória — vazia por padrão em modo dev
spring.datasource.password=

# Dialeto SQL do Hibernate para o H2.
# O Hibernate usa isso para gerar SQL compatível com o banco correto.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Estratégia de criação do schema do banco ao iniciar.
# "create-drop" → cria todas as tabelas ao subir, apaga ao parar.
# Outras opções: "update" (atualiza), "validate" (só valida), "none" (nada faz)
spring.jpa.hibernate.ddl-auto=create-drop

# ============================================================
# Console H2 — interface web para visualizar o banco em memória
# Acesse em: http://localhost:8081/h2-console
# JDBC URL: jdbc:h2:mem:vulnerablelab | User: sa | Password: (vazio)
# ============================================================

# Habilita o console web do H2 — APENAS em desenvolvimento!
# Em produção exporia o banco inteiro sem autenticação segura.
spring.h2.console.enabled=true

# Caminho da URL onde o console H2 estará disponível
spring.h2.console.path=/h2-console

# ============================================================
# Logs SQL — exibe as queries no console do servidor
# Útil para debug, mas expõe dados sensíveis e prejudica performance.
# ============================================================

# Exibe cada query SQL executada pelo Hibernate no console.
# Exemplo de saída: Hibernate: select u1_0.id, u1_0.email from users u1_0
spring.jpa.show-sql=true

# Formata o SQL exibido com indentação para facilitar a leitura.
# Sem isso, a query aparece em uma linha só (difícil de ler).
spring.jpa.properties.hibernate.format_sql=true

# Nível de log do Hibernate para queries SQL — DEBUG mostra tudo.
# Outros níveis: TRACE (mais detalhado), INFO, WARN, ERROR (menos detalhado)
logging.level.org.hibernate.SQL=DEBUG

# Nível de log para o pacote da nossa aplicação — DEBUG em dev.
# Mostra logs de todos os @Slf4j e Logger da aplicação.
logging.level.br.unipar=DEBUG

# Desabilita o aviso "spring.jpa.open-in-view is enabled by default".
# open-in-view mantém a sessão JPA aberta durante o rendering da view,
# o que pode causar queries desnecessárias. false = desabilitado (melhor prática).
spring.jpa.open-in-view=false

# ============================================================
# Paginação Spring Data Web
# Habilita suporte a ?page=0&size=10&sort=id,asc via URL
# ============================================================

# Tamanho padrão da página quando não informado na URL
spring.data.web.pageable.default-page-size=10

# Tamanho máximo permitido por página (evita ?size=999999)
spring.data.web.pageable.max-page-size=100

# Parâmetro usado na URL para o número da página (padrão: "page")
spring.data.web.pageable.page-parameter=page

# Parâmetro usado na URL para o tamanho da página (padrão: "size")
spring.data.web.pageable.size-parameter=size
