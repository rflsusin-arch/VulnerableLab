# ============================================================
# application-prod.properties — Perfil de PRODUÇÃO
# Carregado quando spring.profiles.active=prod
# Objetivo: configuração segura para ambiente real.
# Todas as credenciais vêm de variáveis de ambiente — NUNCA hardcoded.
# Para ativar: java -jar app.jar --spring.profiles.active=prod
#           ou: export SPRING_PROFILES_ACTIVE=prod
# ============================================================

# Porta padrão de produção — 8080 é a convencional para Java web.
# Em ambientes com proxy reverso (Nginx, Azure), pode ser qualquer porta.
server.port=8080

# ============================================================
# Banco de dados — PostgreSQL
# Em produção usamos um banco real e persistente.
# As credenciais NUNCA ficam hardcoded — vêm de variáveis de ambiente.
# ============================================================

# URL de conexão com o PostgreSQL.
# ${DATABASE_URL} → lê a variável de ambiente DATABASE_URL.
# Exemplo de valor: jdbc:postgresql://localhost:5432/vulnerablelab
# Se a variável não existir, a aplicação falha ao subir (proposital —
# impede que suba em produção sem banco configurado).
spring.datasource.url=${DATABASE_URL}

# Usuário do banco PostgreSQL — vem da variável de ambiente DATABASE_USER
spring.datasource.username=${DATABASE_USER}

# Senha do banco PostgreSQL — vem da variável de ambiente DATABASE_PASSWORD
# Nunca exponha senhas em arquivos de configuração versionados no Git.
spring.datasource.password=${DATABASE_PASSWORD}

# Driver JDBC do PostgreSQL — diferente do H2, precisa da dependência no pom.xml
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialeto SQL do Hibernate para PostgreSQL.
# Garante que o SQL gerado seja compatível com a sintaxe do PostgreSQL.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Estratégia de schema em produção: "validate"
# Apenas valida se as tabelas/colunas existem conforme as entidades JPA.
# NÃO cria nem altera tabelas — migrações são feitas via Flyway/Liquibase.
# "create-drop" em produção apagaria todos os dados ao reiniciar!
spring.jpa.hibernate.ddl-auto=validate

# ============================================================
# Console H2 — DESABILITADO em produção
# Em produção não existe H2, mas desabilitamos explicitamente por segurança.
# Se habilitado, exporia uma interface de banco sem autenticação robusta.
# ============================================================
spring.h2.console.enabled=false

# ============================================================
# Logs SQL — DESABILITADOS em produção
# Razões: performance (log de cada query é custoso),
# segurança (queries podem expor dados sensíveis nos logs),
# e ruído (dificulta encontrar erros reais nos logs).
# ============================================================

# Desabilita exibição de queries SQL no console
spring.jpa.show-sql=false

# Desabilita formatação SQL (irrelevante já que show-sql=false, mas explícito)
spring.jpa.properties.hibernate.format_sql=false

# Nível de log do Hibernate para SQL — WARN: só mostra avisos e erros
logging.level.org.hibernate.SQL=WARN

# Nível de log raiz da aplicação — WARN em produção.
# Reduz drasticamente o volume de logs, mostrando só o que importa.
logging.level.root=WARN

# Nível de log do nosso pacote — INFO em produção.
# INFO mostra eventos importantes (startup, requests relevantes)
# sem o excesso de detalhes do DEBUG.
logging.level.br.unipar=INFO

# Desabilita aviso do open-in-view (mesma razão do dev — boa prática)
spring.jpa.open-in-view=false
