# ============================================================
# application.properties — Configurações COMUNS a todos os perfis
# Este arquivo é sempre carregado, independente do perfil ativo.
# As configurações específicas de cada ambiente ficam nos arquivos
# application-dev.properties e application-prod.properties.
# ============================================================

# Nome da aplicação exibido nos logs e no Spring Boot Admin (se usar)
spring.application.name=spring-vulnerable-lab

# Define qual perfil será carregado junto com este arquivo.
# "dev" → carrega application-dev.properties (H2, logs SQL, console H2)
# "prod" → carrega application-prod.properties (PostgreSQL, sem logs, sem H2)
# Para mudar para produção: altere para "prod"
spring.profiles.active=dev

# ============================================================
# JWT — JSON Web Token
# Configurações de autenticação usadas pelo JwtService.java
# ============================================================

# Chave secreta usada para assinar e verificar os tokens JWT.
# Em produção, NUNCA deixe hardcoded aqui use variável de ambiente:
# export JWT_SECRET=sua-chave-super-secreta-de-producao
# A sintaxe ${JWT_SECRET:valor-padrao} significa:
# "use a variável de ambiente JWT_SECRET; se não existir, use o valor padrão"
jwt.secret=minha-chave-secreta-super-longa-para-o-lab-unipar-2026

# Tempo de expiração do token JWT em milissegundos.
# 86400000ms = 86400 segundos = 1440 minutos = 24 horas
# Após esse tempo, o token expira e o usuário precisa fazer login novamente.
jwt.expiration=86400000

# ============================================================
# Swagger / OpenAPI
# Interface visual para testar os endpoints da API no browser
# ============================================================

# Caminho onde o JSON da documentação OpenAPI ficará disponível
# Acesse em: http://localhost:8081/v3/api-docs
springdoc.api-docs.path=/v3/api-docs

# Caminho onde a interface visual Swagger UI ficará disponível
# Acesse em: http://localhost:8081/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
